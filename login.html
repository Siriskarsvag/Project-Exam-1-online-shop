<!doctype html>
<html lang="en">
  <head>
    <title>Login Page</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="..." />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/main.js" defer></script>
    <script src="js/login.js" defer></script>
  </head>
  <body>
    <header>
      <a href="index.html"
        ><img src="assets/image0.png" alt="Yellow C being clicked" class="logo"
      /></a>
      <div class="brand-lines">
        <div class="thin-line"></div>
        <div class="thicker-line"></div>
      </div>
      <h1>The Collection</h1>
      <nav>
        <a href="login.html"
          ><img src="assets/login_19006828.png" alt="Login Icon"
        /></a>
        <a href="cart.html"
          ><img src="assets/shopping-cart_3916598.png" alt="Cart Icon"
        /></a>
      </nav>
    </header>
    <main>
      <section class="login-section">
        <h2>Login</h2>
        <form id="login-form">
          <label for="email"><h6>Email</h6></label>
          <input type="email" id="email" name="email" required />
          <label for="password"><h6>Password</h6></label>
          <input type="password" id="password" name="password" required />
          <button type="submit" class="CTA">Login</button>
          <button type="button" id="register-button">
            <a href="register.html"><h3>Or Sign Up</h3></a>
          </button>
        </form>
      </section>
    </main>
    <footer>
      <p>&copy; 2024 The Collection. All rights reserved.</p>
      <div class="brand-lines">
        <div class="thin-line"></div>
        <div class="thicker-line"></div>
      </div>
    </footer>
  </body>
</html>
